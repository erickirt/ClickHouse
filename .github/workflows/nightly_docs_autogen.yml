      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          PYTHONUNBUFFERED=1 python3 -m praktika run 'Build (arm_binary)' --workflow "NightlyDocsAutogenerate" --ci --timestamp

  docs_autogenerate:
